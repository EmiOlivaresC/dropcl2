<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropCL - Tienda Tecnológica</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      background: linear-gradient(135deg, #1a1a2e, #16213e); 
      color: white;
    }
    header { 
      background: #000; 
      padding: 2rem; 
      text-align: center; 
    }
    .producto { 
      border: 1px solid #333; 
      margin: 15px; 
      padding: 15px; 
      text-align: center; 
      width: 280px; 
      display: inline-block; 
      background: rgba(255,255,255,0.1); 
      border-radius: 12px; 
      backdrop-filter: blur(10px);
    }
    .producto img { 
      width: 100%; 
      height: 180px; 
      object-fit: cover; 
      border-radius: 8px; 
    }
    button { 
      background: #ff6600; 
      color: white; 
      border: none; 
      padding: 12px 24px; 
      cursor: pointer; 
      border-radius: 8px; 
      font-weight: bold; 
      margin-top: 10px;
    }
    button:hover { background: #ff8533; }
  </style>
</head>
<body>

  <header>
    <h1>🚀 DropCL</h1>
    <p>Tecnología que inspira. Estilo que conquista.</p>
  </header>

  <section style="text-align:center; padding: 40px;">
    <h2>Productos Destacados</h2>
    
    <div class="producto">
      <img src="https://via.placeholder.com/300x200?text=Audifonos" alt="Audífonos">
      <h3>Auriculares TWS con ANC</h3>
      <p><strong>$24.990</strong></p>
      <button onclick="agregarAlCarrito('Auriculares TWS con ANC', 24990)">Agregar al carrito</button>
    </div>

    <div class="producto">
      <img src="https://via.placeholder.com/300x200?text=Powerbank" alt="Power Bank">
      <h3>Power Bank 20.000 mAh</h3>
      <p><strong>$14.990</strong></p>
      <button onclick="agregarAlCarrito('Power Bank 20.000 mAh', 14990)">Agregar al carrito</button>
    </div>
  </section>

  <script>
    function agregarAlCarrito(nombre, precio) {
      alert(`✅ ${nombre} agregado al carrito por $${precio.toLocaleString('es-CL')}`);
    }
  </script>

</body>
</html>
