<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropCL - Tienda Tecnológica</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      background: url('https://grok.x.ai/generated-image/LUXnt') no-repeat center center fixed;
      background-size: cover;
      color: white;
    }
    header { 
      background: rgba(0,0,0,0.85); 
      padding: 2rem; 
      text-align: center; 
    }
    .producto { 
      border: 1px solid rgba(255,255,255,0.2); 
      margin: 15px; 
      padding: 15px; 
      text-align: center; 
      width: 280px; 
      display: inline-block; 
      background: rgba(0,0,0,0.6); 
      border-radius: 12px; 
      backdrop-filter: blur(10px);
    }
    .producto img { 
      width: 100%; 
      height: 180px; 
      object-fit: cover; 
      border-radius: 8px; 
    }
    button { 
      background: #ff6600; 
      color: white; 
      border: none; 
      padding: 12px 24px; 
      cursor: pointer; 
      border-radius: 8px; 
      font-weight: bold; 
      margin: 5px;
    }
    button:hover { background: #ff8533; }
    #carrito { 
      position: fixed; 
      top: 20px; 
      right: 20px; 
      background: rgba(0,0,0,0.9); 
      padding: 15px; 
      border-radius: 10px; 
      width: 300px; 
      max-height: 80vh; 
      overflow-y: auto; 
      box-shadow: 0 0 20px rgba(0,0,0,0.5); 
    }
  </style>
</head>
<body>

  <header>
    <h1>🚀 DropCL</h1>
    <p>Tecnología que inspira. Estilo que conquista.</p>
  </header>

  <section style="text-align:center; padding: 40px;">
    <h2>Productos Destacados</h2>
    
    <div class="producto">
      <img src="https://via.placeholder.com/300x200?text=Audifonos" alt="Audífonos">
      <h3>Auriculares TWS con ANC</h3>
      <p><strong>$24.990</strong></p>
      <button onclick="agregarAlCarrito('Auriculares TWS con ANC', 24990)">Agregar al carrito</button>
    </div>

    <div class="producto">
      <img src="https://via.placeholder.com/300x200?text=Powerbank" alt="Power Bank">
      <h3>Power Bank 20.000 mAh</h3>
      <p><strong>$14.990</strong></p>
      <button onclick="agregarAlCarrito('Power Bank 20.000 mAh', 14990)">Agregar al carrito</button>
    </div>
  </section>

  <!-- Carrito visible -->
  <div id="carrito">
    <h3>🛒 Carrito (<span id="contador">0</span>)</h3>
    <div id="lista-carrito"></div>
    <p>Total: $<span id="total">0</span></p>
    <button onclick="iniciarPago()" style="width:100%; background:#00cc00;">Iniciar con el pago</button>
  </div>

  <script>
    let carrito = [];

    function agregarAlCarrito(nombre, precio) {
      carrito.push({nombre, precio});
      actualizarCarrito();
      alert(`✅ ${nombre} agregado al carrito`);
    }

    function actualizarCarrito() {
      let lista = document.getElementById('lista-carrito');
      let total = 0;
      lista.innerHTML = '';
      carrito.forEach(item => {
        total += item.precio;
        lista.innerHTML += `<div class="producto-carrito">${item.nombre} - $${item.precio}</div>`;
      });
      document.getElementById('contador').textContent = carrito.length;
      document.getElementById('total').textContent = total.toLocaleString('es-CL');
    }

    function iniciarPago() {
      if (carrito.length === 0) {
        alert("El carrito está vacío");
        return;
      }
      alert("Redirigiendo a Webpay...");
      window.open("https://www.webpay.cl", "_blank");
    }
  </script>

</body>
</html>
